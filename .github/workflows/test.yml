name: Test

# Full database testing workflow: PostgreSQL, MySQL, MariaDB, Oracle, plus
# SQLite on Windows and macOS. Use this if your app has database-specific
# behavior that needs to be validated across backends.
# If you only need SQLite testing, use test.yml instead and delete this file.

permissions:
  contents: read

on:
  push:
    tags-ignore:
      - '*'
    branches: ['main']
  pull_request:
    branches: ['main']
  merge_group:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      debug:
        description: 'Open ssh debug session.'
        required: true
        default: false
        type: boolean
      clear_cache:
        description: 'Clear GitHub Tool cache.'
        required: true
        default: false
        type: boolean
  schedule:
    # Every Sunday at 9:00 AM Los Angeles time (17:00 UTC).
    - cron: '0 17 * * 0'

jobs:

  postgres:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        postgres-version: ['12', '17']
        psycopg-version: ['psycopg2', 'psycopg3']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - django-version: 'dj42'
            postgres-version: '17'
          - python-version: '3.13'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'
          - postgres-version: '12'
            psycopg-version: 'psycopg3'
          - postgres-version: '12'
            django-version: 'dj52'
          # https://github.com/psycopg/psycopg2/pull/1695
          - python-version: '3.13'
            psycopg-version: 'psycopg2'
          - python-version: '3.14'
            psycopg-version: 'psycopg2'
          - postgres-version: '12'
            django-version: 'dj60'
          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.11'
            django-version: 'dj60'

    env:
      RDBMS: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      COVERAGE_FILE: linux-py${{ matrix.python-version }}-${{ matrix.django-version }}-${{ matrix.psycopg-version }}-pg${{ matrix.postgres-version }}.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_CLIENT_VERSION: ${{ matrix.psycopg-version }}
      TEST_DATABASE_VERSION: ${{ matrix.postgres-version }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Clear Tool cache
      if: ${{ github.event.inputs.clear_cache == 'true' }}
      run: sudo rm -rf /opt/hostedtoolcache
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      id: sp
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: false
    - name: Setup Just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
    - name: Install PostgreSQL client tools
      run: |
        sudo apt-get install -y gnupg curl lsb-release
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
          | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
        echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
          | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update -qq
        sudo apt-get install -y postgresql-client-${{ matrix.postgres-version }}
    - name: Install Emacs
      if: ${{ github.event.inputs.debug == 'true' }}
      run: |
        sudo apt install emacs
    - name: Setup tmate session
      if: ${{ github.event.inputs.debug == 'true' }}
      uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
      timeout-minutes: 60
    - name: Run Unit Tests
      env:
        TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
      run: |
        just test-all --group "${{ matrix.psycopg-version }}" -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
    - name: Store coverage files
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ env.COVERAGE_FILE }}
        path: ${{ env.COVERAGE_FILE }}

  sqlite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      RDBMS: sqlite
      COVERAGE_FILE: linux-py${{ matrix.python-version }}-${{ matrix.django-version }}-sqlite.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_VERSION: "sqlite"
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Install Emacs
        if: ${{ github.event.inputs.debug == 'true' }}
        run: sudo apt install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          just test-all -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  mysql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        mysql-version: ['8.0', 'latest']
        mysqlclient-version: ['mysqlclient14', 'mysqlclient2x']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - django-version: 'dj42'
            mysql-version: 'latest'

          - django-version: 'dj60'
            mysql-version: '8.0'

          - mysql-version: 'latest'
            mysqlclient-version: 'mysqlclient14'

          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'
          - django-version: 'dj52'
            mysqlclient-version: 'mysqlclient14'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    env:
      RDBMS: mysql
      MYSQL_VERSION: ${{ matrix.mysql-version }}
      COVERAGE_FILE: linux-py${{ matrix.python-version }}-${{ matrix.django-version }}-${{ matrix.mysqlclient-version }}-mysql${{ matrix.mysql-version }}.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_CLIENT_VERSION: ${{ matrix.mysqlclient-version }}
      TEST_DATABASE_VERSION: ${{ matrix.mysql-version }}

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Emacs
        if: ${{ github.event.inputs.debug == 'true' }}
        run: sudo apt install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          just test-all --group "${{ matrix.mysqlclient-version }}" -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  mariadb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      RDBMS: mariadb
      COVERAGE_FILE: linux-py${{ matrix.python-version }}-${{ matrix.django-version }}-${{ matrix.mysqlclient-version }}-mariadb${{ matrix.mariadb-version }}.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_CLIENT_VERSION: ${{ matrix.mysqlclient-version }}
      TEST_DATABASE_VERSION: ${{ matrix.mariadb-version }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        mysqlclient-version: ['mysqlclient14', 'mysqlclient2x']
        mariadb-version: ['10.4', 'latest']
        mariadb-healthcheck: ["mysqladmin ping", "healthcheck.sh --connect --innodb_initialized"]
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - django-version: 'dj42'
            mariadb-version: 'latest'

          - django-version: 'dj52'
            mariadb-version: '10.4'
          - django-version: 'dj60'
            mariadb-version: '10.4'

          - mariadb-version: 'latest'
            mysqlclient-version: 'mysqlclient14'

          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'
          - django-version: 'dj52'
            mysqlclient-version: 'mysqlclient14'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

          - mariadb-version: '10.4'
            mysqlclient-version: 'mysqlclient2x'

          - mariadb-version: 'latest'
            mariadb-healthcheck: "mysqladmin ping"
          - mariadb-version: '10.4'
            mariadb-healthcheck: "healthcheck.sh --connect --innodb_initialized"

    services:
      mysql:
        image: mariadb:${{ matrix.mariadb-version }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        options: >-
          --health-cmd="${{ matrix.mariadb-healthcheck }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Emacs
        if: ${{ github.event.inputs.debug == 'true' }}
        run: sudo apt install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          just test-all --group "${{ matrix.mysqlclient-version }}" -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  oracle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      RDBMS: oracle
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_VERSION: ${{ matrix.oracle-version }}
      IGNORE_ORA_01843: True
      IGNORE_ORA_00932: True
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        oracle-version:
          - 'oracle-xe:21'
          - 'oracle-free:latest'
        exclude:
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

          - django-version: 'dj42'
            oracle-version: 'oracle-free:latest'
          - django-version: 'dj52'
            oracle-version: 'oracle-xe:21'
          - django-version: 'dj60'
            oracle-version: 'oracle-xe:21'

    services:
      oracle:
        image: gvenzl/${{ matrix.oracle-version }}  # zizmor: ignore[unpinned-images]
        env:
          ORACLE_PASSWORD: password
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - name: Set coverage file
        run: |
          ORACLE_TAG=$(echo "${{ matrix.oracle-version }}" | cut -d':' -f2)
          echo "COVERAGE_FILE=linux-py${{ matrix.python-version }}-${{ matrix.django-version }}-oracle${ORACLE_TAG}.coverage" >> $GITHUB_ENV
          if [[ "${{ matrix.django-version }}" == "dj42" ]]; then
            echo "ORACLE_DATABASE=XEPDB1" >> $GITHUB_ENV
          else
            echo "ORACLE_DATABASE=FREEPDB1" >> $GITHUB_ENV
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        id: sp
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Emacs
        if: ${{ github.event.inputs.debug == 'true' }}
        run: sudo apt install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Install Oracle Client
        # https://askubuntu.com/questions/1512196/libaio1-on-noble
        run: |
          sudo apt install alien libaio1t64
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1t64 /usr/lib/x86_64-linux-gnu/libaio.so.1
          if [[ "${{ matrix.django-version }}" == "dj42" ]]; then
            curl --output oracle-client.rpm https://download.oracle.com/otn_software/linux/instantclient/2116000/oracle-instantclient-basiclite-21.16.0.0.0-1.el8.x86_64.rpm
            sudo alien -i oracle-client.rpm
            sudo sh -c "echo /usr/lib/oracle/21/client64/lib/ > /etc/ld.so.conf.d/oracle.conf"
          else
            curl --output oracle-client.rpm https://download.oracle.com/otn_software/linux/instantclient/2326000/oracle-instantclient-basiclite-23.26.0.0.0-1.el9.x86_64.rpm
            sudo alien -i oracle-client.rpm
            sudo sh -c "echo /usr/lib/oracle/23/client64/lib/ > /etc/ld.so.conf.d/oracle.conf"
          fi
          sudo ldconfig
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          if [[ "$TEST_DJANGO_VERSION" == "dj42" ]]; then
            just test-all --group cx_oracle -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
          else
            just test-all --group oracledb -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
          fi
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write
    env:
      RDBMS: sqlite
      COVERAGE_FILE: windows-py${{ matrix.python-version }}-${{ matrix.django-version }}-sqlite.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_VERSION: "sqlite"
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: install-vim-windows
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          just test-all -p "$env:TEST_PYTHON" --group "$env:TEST_DJANGO_VERSION"
        shell: pwsh
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    env:
      RDBMS: sqlite
      COVERAGE_FILE: macos-py${{ matrix.python-version }}-${{ matrix.django-version }}-sqlite.coverage
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}
      TEST_DATABASE_VERSION: "sqlite"
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.14']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: install-emacs-macos
        if: ${{ github.event.inputs.debug == 'true' }}
        run: |
          brew install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
      - name: Run Unit Tests
        env:
          TEST_PYTHON: ${{ steps.sp.outputs.python-path }}
        run: |
          just test-all -p "$TEST_PYTHON" --group "$TEST_DJANGO_VERSION"
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.COVERAGE_FILE }}
          path: ${{ env.COVERAGE_FILE }}

  coverage-combine:
    needs: [postgres, sqlite, mysql, mariadb, oracle, windows, macos]
    runs-on: ubuntu-latest
    environment: codecov
    permissions:
      contents: read
    steps:
      - name: Clear Tool cache
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: sudo rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: "*.coverage"
          merge-multiple: true
      - run: ls -la *.coverage
      - run: just coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
